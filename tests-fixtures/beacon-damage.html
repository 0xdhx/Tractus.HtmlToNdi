<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Beacon A=1 Low-Alpha Damage Gate Fixture (Q2 / A4)</title>
  <!--
    03-03 (Q2 / A4) A=1 LOW-ALPHA-DAMAGE VALIDATION FIXTURE for the --beacon-damage-check self-check.

    A4 HISTORY (research §19): the ONE genuine empirical unknown of Phase 3 was whether an alpha-0 corner
    whose RGB mutates every rAF tick produces CAPTURED OnPaint damage on CefSharp 148. The live Q2 gate
    (now trustworthy) REFUTED it: the alpha-0 corner composites near-transparent and the un-premult LUT
    amplifies it to a CONSTANT near-white (~[227,243,249]) that MASKS the per-tick RGB mutation — no
    detectable change in the straight buffer the FrameMonitor samples. This fixture now mirrors the A4
    fallback beacon: a UNIFORM alpha = 1/255 (≈0.4% opacity) fill with mutating RGB. At ~0.4% opacity it
    keys out ~invisibly on air, yet a PRESENT low-alpha region's RGB is amplified by the un-premult LUT into
    a detectable pre-key swing. The gate asserts that swing (beacon-region RGB DIFFERS between captures).

    LAYOUT (mirrors the production InjectHook beacon by VALUE — keep in sync):
      - A 16x16 canvas pinned TOP-LEFT (0,0) filled UNIFORMLY each rAF tick at alpha = 1/255 with RGB that
        cycles. This is the beacon region the gate samples in BOTH captures and asserts the RGB DIFFERS.
      - A static OPAQUE content block filling the rest of the viewport so each captured frame is NON-BLANK
        (the one-shot pre-send capture skips blank frames). The static block does NOT change, isolating the
        beacon corner as the only mutating region.

    The canvas occupies REAL captured pixels: fixed top-left, NOT display:none / visibility:hidden /
    0-size / off-screen (all cull the paint, research §18). The gate runs on the production CefWrapper path
    with a transparent BackgroundColor (D-29c) + the un-premult LUT, so the corner reads back as STRAIGHT
    pre-key bytes — exactly what the FrameMonitor beacon sample reads.
  -->
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; }
    /* Static OPAQUE content so every captured frame is non-blank; does NOT change (isolates the beacon). */
    #content {
      position: fixed; left: 0; top: 0; width: 100vw; height: 100vh;
      background-color: rgba(0, 128, 0, 1); /* opaque green — keeps the frame non-blank, never mutates */
      z-index: 0;
    }
    /* The A=1 low-alpha beacon canvas, top-left corner, real captured pixels. */
    #beacon {
      position: fixed; left: 0; top: 0; width: 16px; height: 16px;
      margin: 0; padding: 0; pointer-events: none; background: transparent;
      z-index: 2147483647;
    }
  </style>
</head>
<body>
  <div id="content"></div>
  <canvas id="beacon" width="16" height="16"></canvas>
  <script>
    // The A=1 low-alpha beacon (D-13 A4): clear, then fill the FULL 16x16 UNIFORMLY at alpha = 1/255 with
    // RGB cycling each tick. Mirrors InjectHook.BuildPayload's __xpnBeaconDraw exactly (production shape).
    (function () {
      var c = document.getElementById('beacon');
      var ctx = c.getContext('2d');
      var tick = 0;
      function draw() {
        tick = (tick + 1) & 0xff;
        ctx.clearRect(0, 0, 16, 16);
        var r = (tick * 7) & 0xff;
        var g = (tick * 13) & 0xff;
        var b = (tick * 29) & 0xff;
        ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (1 / 255) + ')';
        ctx.fillRect(0, 0, 16, 16);
        window.requestAnimationFrame(draw);
      }
      window.requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
